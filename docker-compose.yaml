version: "3.9"

services:
  endpoint-exporter:
    build: .
    container_name: api-tester-endpoint-exporter
    command: ["/app/export-endpoints", "-config", "/app/configs/config.yaml"]
    volumes:
      - ./configs/config.yaml:/app/configs/config.yaml
      - ./configs/endpoints.generated.yaml:/app/configs/endpoints.generated.yaml
      - /Users/allenflux/PyCharmProject/temp/backend:/workspace/target-project:ro
    restart: "no"

  api-tester:
    build: .
    container_name: api-tester
    command: ["/app/api-tester", "-config", "/app/configs/config.yaml", "-mode", "serve"]
    ports:
      - "18081:18081"
    volumes:
      - ./configs/config.yaml:/app/configs/config.yaml
      - ./configs/endpoints.generated.yaml:/app/configs/endpoints.generated.yaml
      - ./data:/app/data
      - ./reports:/app/reports
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: api-tester-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "19090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped
    depends_on:
      - api-tester

  grafana:
    image: grafana/grafana:11.3.1
    container_name: api-tester-grafana
    ports:
      - "13000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    restart: unless-stopped
    depends_on:
      - prometheus
