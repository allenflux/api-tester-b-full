app:
  name: api-tester
  env: prod

source:
  project_root: /workspace/target-project
  router_dirs:
    - src/routers
  exclude_paths:
    - __pycache__
    - __MACOSX

api:
  base_url: 216.176.194.30:8089
  apikey: change-me
  apikey_header: Apikey
  headers: {}
  task_status_path: /api/public/task
  task_status_method: GET
  task_status_id_field: task_id
  task_status_value_key: status
  success_statuses: [2]
  failure_statuses: [3, 4, 5]
  request_timeout_sec: 30
  insecure_skip_verify: false

runner:
  mode: smoke
  scan_on_startup: true
  concurrency: 8
  poll_interval_sec: 3
  task_timeout_sec: 900
  http_timeout_sec: 30
  max_endpoint_rounds: 1
  retry_count: 1
  retry_backoff_ms: 1500
  report_dir: reports
  only_include_task_apis: false

stress:
  enabled: true
  concurrency: 20
  duration_sec: 0
  per_endpoint_rounds: 2
  global_rate_limit_rps: 10
  stop_on_high_failure_rate: true
  high_failure_rate_pct: 40

schedule:
  enabled: true
  cron: "0 3 * * *"
  run_at_start: true

database:
  path: data/api_tester.db

web:
  listen_addr: ":18081"
  base_path: /

overrides:
  defaults: {}
  by_parameter_name:
    source_path:
      - https://example.com/source.jpg
    target_path:
      - https://example.com/target.jpg
      - https://example.com/target.mp4
    prompt:
      - a portrait with natural lighting
    scene_name:
      - default_scene
    output_format:
      - png
      - video
    fee:
      - "1"
    bid:
      - smoke-bid
    title:
      - api-tester
    notify_url:
      - https://example.com/webhook
  by_path:
    /api/public/generate/undress/anime/video:
      source_path:
        - https://example.com/source.jpg
      scene_name:
        - sexual_intercourse_oral_sex_group_sex_two_person_real_sex
      output_format:
        - video
      fee:
        - "1"
      bid:
        - a7f9f994-a1bf-487b-a3a0-5334492ebce2
      title:
        - 2026恭喜发财3d
      notify_url:
        - https://example.com/webhook
      hash_key:
        - ""
      task_id:
        - ""
    /api/public/task:
      task_id:
        - 167d3c28-ca32-4df8-b454-53cfe0e332c2
  disabled_paths:
    - /api/mq/queues/action
